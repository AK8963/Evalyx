name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: traciq
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: traciq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://traciq:testpass@localhost:5432/traciq_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-not-for-production
      DEBUG: "True"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r requirements-backend.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        run: pytest tests/backend/ -v --tb=short

      - name: Install frontend dependencies
        run: pip install -r requirements-frontend.txt

      - name: Install SDK dependencies
        run: pip install -r requirements-sdk.txt

      - name: Run SDK tests
        run: pytest tests/sdk/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install linters
        run: pip install ruff
      - name: Run ruff
        run: ruff check backend/ sdk/ database/ --ignore E501

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            traciq/backend:latest
            traciq/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            traciq/frontend:latest
            traciq/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" > ~/.kube/config

      - name: Deploy to staging
        run: |
          kubectl set image deployment/backend \
            backend=traciq/backend:${{ github.sha }} \
            -n traciq
          kubectl set image deployment/frontend \
            frontend=traciq/frontend:${{ github.sha }} \
            -n traciq
          kubectl rollout status deployment/backend -n traciq --timeout=120s
          kubectl rollout status deployment/frontend -n traciq --timeout=120s

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" > ~/.kube/config

      - name: Deploy to production
        run: |
          kubectl set image deployment/backend \
            backend=traciq/backend:${{ github.sha }} \
            -n traciq
          kubectl set image deployment/frontend \
            frontend=traciq/frontend:${{ github.sha }} \
            -n traciq
          kubectl rollout status deployment/backend -n traciq --timeout=180s
          kubectl rollout status deployment/frontend -n traciq --timeout=180s
