services:
  prometheus:
    image: prom/prometheus:latest
    container_name: traciq_prometheus
    ports:
      - "9092:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    networks:
      - traciq_network

  grafana:
    image: grafana/grafana:latest
    container_name: traciq_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - traciq_network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: traciq_pg_exporter
    environment:
      DATA_SOURCE_NAME: postgresql://traciq:traciq_dev@traciq_postgres:5432/traciq_db?sslmode=disable
    depends_on:
      - prometheus
    networks:
      - traciq_network

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: traciq_redis_exporter
    environment:
      REDIS_ADDR: redis://traciq_redis:6379
    depends_on:
      - prometheus
    networks:
      - traciq_network

volumes:
  prometheus_data:
  grafana_data:

networks:
  traciq_network:
    external: true
    name: traciq_network
