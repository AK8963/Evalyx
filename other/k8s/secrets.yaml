---
apiVersion: v1
kind: Secret
metadata:
  name: traciq-secrets
  namespace: traciq
type: Opaque
stringData:
  postgres-user: traciq
  postgres-password: CHANGE_ME_IN_PRODUCTION
  secret-key: CHANGE_ME_IN_PRODUCTION_LONG_RANDOM_STRING
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: traciq-config
  namespace: traciq
data:
  DATABASE_URL: postgresql://traciq:CHANGE_ME_IN_PRODUCTION@postgres:5432/traciq_db
  REDIS_URL: redis://redis:6379/0
  QDRANT_URL: http://qdrant:6333
  DEBUG: "False"
  EMBEDDING_MODEL: all-MiniLM-L6-v2
  TOPICS_ENABLED: "true"
  SEMANTIC_SEARCH_ENABLED: "true"
  GATEWAY_ENABLED: "true"
  BACKEND_API_URL: http://backend:8000
